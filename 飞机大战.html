<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✈️ 飞机大战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            overflow: hidden;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas { display: block; background: #0a0e1a; }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(5,8,20,0.92);
            z-index: 100;
            flex-direction: column;
            text-align: center;
            color: #fff;
        }
        .overlay h1 { font-size: 42px; color: #7dd3fc; margin-bottom: 12px; }
        .overlay .subtitle { color: #94a3b8; font-size: 18px; margin-bottom: 30px; }
        .controls-info {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px 36px;
            margin-bottom: 30px;
            border: 1px solid #334155;
            max-width: 90vw;
        }
        .controls-info h3 { color: #7dd3fc; margin-bottom: 14px; font-size: 20px; }
        .controls-info p { color: #cbd5e1; font-size: 15px; margin: 6px 0; line-height: 1.6; }
        .controls-info .key { display: inline-block; padding: 2px 8px; background: #334155; border-radius: 4px; font-family: monospace; font-size: 14px; }
        .btn-start {
            padding: 14px 50px; font-size: 20px; border: none; border-radius: 10px;
            background: #3b82f6; color: #fff; cursor: pointer; font-weight: bold;
            transition: background 0.2s;
        }
        .btn-start:hover { background: #2563eb; }
        .score-board {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 20px; z-index: 50; pointer-events: none;
            background: rgba(0,0,0,0.4); padding: 6px 20px; border-radius: 20px;
        }
        .score-board span { color: #7dd3fc; font-weight: bold; font-size: 24px; }
        /* 道具提示条 */
        .powerup-bar {
            position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
            z-index: 60; pointer-events: none; display: flex; gap: 12px;
            font-size: 12px; color: #aaa;
        }
        .powerup-bar .tag {
            background: rgba(20,20,40,0.8); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 3px 10px; white-space: nowrap;
            opacity: 0; transition: opacity 0.3s;
        }
        .powerup-bar .tag.active { opacity: 1; }
        .powerup-bar .tag.speed { color: #ffd700; border-color: rgba(255,215,0,0.3); }
        .powerup-bar .tag.spread { color: #00cec9; border-color: rgba(0,206,201,0.3); }
        .powerup-bar .tag.power { color: #e84393; border-color: rgba(232,67,147,0.3); }
        /* 掉落道具提示 */
        .pickup-notify {
            position: fixed; top: 85px; left: 50%; transform: translateX(-50%);
            color: #ffd700; font-size: 13px; font-weight: bold; z-index: 65;
            pointer-events: none; text-shadow: 0 0 8px rgba(255,215,0,0.5);
            opacity: 0; transition: opacity 0.3s;
        }
        .pickup-notify.show { opacity: 1; }
        /* BOSS提示 */
        .boss-warn {
            position: fixed; top: 35%; left: 50%; transform: translate(-50%, -50%) scale(0);
            color: #e74c3c; font-size: 48px; font-weight: 900; z-index: 70;
            pointer-events: none; text-shadow: 0 0 30px rgba(231,76,60,0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 4px;
        }
        .boss-warn.show { transform: translate(-50%, -50%) scale(1); }
        @media (max-width: 768px) {
            .boss-warn { font-size: 36px; }
            .powerup-bar { top: 48px; font-size: 11px; gap: 8px; }
            .pickup-notify { top: 72px; font-size: 12px; }
        }
        /* 返回大厅 */
        .back-btn {
            position: fixed; top: 12px; left: 12px; z-index: 99999;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(30,30,50,0.85); border: 2px solid rgba(255,255,255,0.3);
            color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.25s ease;
            text-decoration: none; pointer-events: auto; touch-action: manipulation;
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
        }
        .back-btn:hover, .back-btn:active {
            background: rgba(50,50,80,0.9); border-color: rgba(255,255,255,0.5);
            transform: scale(1.1); box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        @media (max-width: 768px) {
            .back-btn { width: 40px; height: 40px; font-size: 18px; top: 10px; left: 10px; }
            .overlay h1 { font-size: 32px; }
            .overlay .subtitle { font-size: 16px; }
            .controls-info { padding: 18px 24px; }
            .controls-info h3 { font-size: 16px; }
            .controls-info p { font-size: 13px; }
            .btn-start { padding: 12px 36px; font-size: 18px; }
            .score-board { font-size: 16px; top: 8px; }
            .score-board span { font-size: 20px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn" title="返回大厅" onclick="event.stopPropagation();">🏠</a>
    <div class="score-board" id="scoreBoard" style="display:none">得分: <span id="score">0</span></div>
    <div class="powerup-bar" id="powerupBar">
        <div class="tag speed" id="tagSpeed">⚡ 射速</div>
        <div class="tag spread" id="tagSpread">✦ 散射</div>
        <div class="tag power" id="tagPower">⚔️ 威力</div>
    </div>
    <div class="pickup-notify" id="pickupNotify"></div>
    <div class="boss-warn" id="bossWarn">👹 BOSS来袭</div>

    <div class="overlay" id="startOverlay">
        <h1>✈️ 飞机大战</h1>
        <div class="subtitle">躲避敌机，击落它们！</div>
        <div class="controls-info">
            <h3>🖥 电脑操作</h3>
            <p><span class="key">←</span> <span class="key">↑</span> <span class="key">↓</span> <span class="key">→</span> 方向键移动飞机</p>
            <p><b>鼠标左键按住拖动</b> 也可控制飞机移动</p>
            <p>自动射击，无需按键</p>
            <h3 style="margin-top:16px">📱 手机操作</h3>
            <p>手指在屏幕下半区域拖动控制飞机</p>
            <p>自动射击，无需点击</p>
        </div>
        <button class="btn-start" id="btnStart" onclick="startGame()">开始游戏</button>
    </div>

    <div class="overlay" id="overOverlay" style="display:none">
        <h1 style="color:#e74c3c">💥 被击中了</h1>
        <div class="subtitle" style="font-size:22px">最终得分: <span id="finalScore" style="color:#7dd3fc;font-weight:bold;font-size:28px">0</span></div>
        <button class="btn-start" onclick="restartGame()" style="margin-top:24px">再来一局</button>
    </div>

    <canvas id="game"></canvas>

<script>
(function() {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const startOverlay = document.getElementById('startOverlay');
    const overOverlay = document.getElementById('overOverlay');
    const scoreBoard = document.getElementById('scoreBoard');
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('finalScore');
    const tagSpeed = document.getElementById('tagSpeed');
    const tagSpread = document.getElementById('tagSpread');
    const tagPower = document.getElementById('tagPower');
    const pickupNotify = document.getElementById('pickupNotify');
    const bossWarn = document.getElementById('bossWarn');

    const isMobile = window.innerWidth <= 768 || 'ontouchstart' in window;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ============ 音效 ============
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function ensureAudio() {
        if (!audioCtx) audioCtx = new AudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playSound(type) {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        switch(type) {
            case 'shoot':
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, t);
                osc.frequency.exponentialRampToValueAtTime(400, t + 0.05);
                gain.gain.setValueAtTime(0.05, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
                osc.start(t); osc.stop(t + 0.05);
                break;
            case 'hit':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, t);
                osc.frequency.exponentialRampToValueAtTime(50, t + 0.15);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                osc.start(t); osc.stop(t + 0.15);
                break;
            case 'explode':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(30, t + 0.3);
                gain.gain.setValueAtTime(0.12, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                osc.start(t); osc.stop(t + 0.3);
                break;
            case 'bossHit':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, t);
                osc.frequency.exponentialRampToValueAtTime(50, t + 0.2);
                gain.gain.setValueAtTime(0.15, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
                break;
            case 'bossExplode':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, t);
                osc.frequency.exponentialRampToValueAtTime(20, t + 0.6);
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
                osc.start(t); osc.stop(t + 0.6);
                break;
            case 'powerup':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523, t);
                osc.frequency.setValueAtTime(659, t + 0.08);
                osc.frequency.setValueAtTime(784, t + 0.16);
                gain.gain.setValueAtTime(0.08, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                osc.start(t); osc.stop(t + 0.4);
                break;
            case 'playerHit':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(80, t + 0.4);
                gain.gain.setValueAtTime(0.15, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                osc.start(t); osc.stop(t + 0.4);
                break;
        }
    }

    // 游戏状态
    let running = false;
    let score = 0;
    let lastShot = 0;
    let lastEnemy = 0;
    const scale = isMobile ? 0.75 : 1;

    // 玩家
    const player = {
        x: 0, y: 0,
        w: Math.round(40 * scale), h: Math.round(50 * scale),
        speed: isMobile ? 7 : 6,
        hp: 1
    };

    // 子弹属性
    let bulletSpeed = 1.0;
    let bulletSpread = 1;
    let bulletPower = 1;
    const POWERUP_DURATION = 20000;
    const powerupTimers = { speed: 0, spread: 0, power: 0 };

    const bullets = [];
    const enemies = [];
    const particles = [];
    const stars = [];
    const powerups = [];
    const bossBullets = []; // Boss子弹

    // BOSS
    let boss = null;
    let bossSpawned = false;
    let nextBossScore = 2000;
    let bossWarnTimer = 0;

    for (let i = 0; i < 80; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            s: Math.random() * 1 + 0.3
        });
    }

    function initPlayer() {
        player.x = canvas.width / 2 - player.w / 2;
        player.y = canvas.height - player.h - (isMobile ? 30 : 40);
        player.hp = 1;
        bulletSpeed = 1.0; bulletSpread = 1; bulletPower = 1;
        powerupTimers.speed = 0; powerupTimers.spread = 0; powerupTimers.power = 0;
        boss = null; bossSpawned = false; nextBossScore = 2000;
    }

    function getSpeedLevel() {
        return Math.floor(score / 200);
    }

    function getCountLevel() {
        return Math.floor(score / 1000);
    }

    function updatePowerupUI() {
        tagSpeed.classList.toggle('active', powerupTimers.speed > 0);
        tagSpread.classList.toggle('active', powerupTimers.spread > 0);
        tagPower.classList.toggle('active', powerupTimers.power > 0);
        if (powerupTimers.speed > 0) tagSpeed.textContent = '⚡ 射速 ' + Math.ceil(powerupTimers.speed / 1000) + 's';
        else tagSpeed.textContent = '⚡ 射速';
        if (powerupTimers.spread > 0) tagSpread.textContent = '✦ 散射 ' + Math.ceil(powerupTimers.spread / 1000) + 's';
        else tagSpread.textContent = '✦ 散射';
        if (powerupTimers.power > 0) tagPower.textContent = '⚔️ 威力 ' + Math.ceil(powerupTimers.power / 1000) + 's';
        else tagPower.textContent = '⚔️ 威力';
    }

    function showPickup(text) {
        pickupNotify.textContent = text;
        pickupNotify.classList.add('show');
        setTimeout(() => pickupNotify.classList.remove('show'), 1500);
    }

    function applyPowerup(type) {
        playSound('powerup');
        switch(type) {
            case 'speed': bulletSpeed = Math.min(2.0, bulletSpeed + 0.3); powerupTimers.speed += POWERUP_DURATION; showPickup('⚡ 子弹速度提升！'); break;
            case 'spread': bulletSpread = Math.min(3, bulletSpread + 1); powerupTimers.spread += POWERUP_DURATION; showPickup('✦ 子弹扩散升级！'); break;
            case 'power': bulletPower = Math.min(3, bulletPower + 1); powerupTimers.power += POWERUP_DURATION; showPickup('⚔️ 子弹威力提升！'); break;
        }
    }

    function checkPowerupExpire(dt) {
        let changed = false;
        if (powerupTimers.speed > 0) { powerupTimers.speed -= dt; if (powerupTimers.speed <= 0) { powerupTimers.speed = 0; bulletSpeed = 1.0; changed = true; }}
        if (powerupTimers.spread > 0) { powerupTimers.spread -= dt; if (powerupTimers.spread <= 0) { powerupTimers.spread = 0; bulletSpread = 1; changed = true; }}
        if (powerupTimers.power > 0) { powerupTimers.power -= dt; if (powerupTimers.power <= 0) { powerupTimers.power = 0; bulletPower = 1; changed = true; }}
        if (changed) updatePowerupUI();
    }

    // 输入
    const keys = {};
    let touchX = null, touchY = null;
    let mouseX = null, mouseY = null, mouseDown = false;
    document.addEventListener('keydown', e => {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
        keys[e.key] = true;
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });
    canvas.addEventListener('touchstart', e => {
        e.preventDefault(); ensureAudio();
        const t = e.touches[0];
        if (t.clientY > canvas.height * 0.35) { touchX = t.clientX; touchY = t.clientY; }
    }, {passive: false});
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        if (t.clientY > canvas.height * 0.35) { touchX = t.clientX; touchY = t.clientY; }
    }, {passive: false});
    canvas.addEventListener('touchend', e => { e.preventDefault(); touchX = null; touchY = null; }, {passive: false});
    // 鼠标控制
    canvas.addEventListener('mousedown', e => {
        mouseDown = true; ensureAudio();
        mouseX = e.clientX; mouseY = e.clientY;
    });
    canvas.addEventListener('mousemove', e => {
        if (mouseDown) { mouseX = e.clientX; mouseY = e.clientY; }
    });
    canvas.addEventListener('mouseup', e => { mouseDown = false; mouseX = null; mouseY = null; });
    canvas.addEventListener('mouseleave', e => { mouseDown = false; mouseX = null; mouseY = null; });

    // ============ 实体创建 ============
    function createBullet() {
        const baseVy = -10 * bulletSpeed;
        const centerX = player.x + player.w / 2;
        const y = player.y;
        const w = Math.max(4, Math.round(6 * scale));
        const h = Math.round(14 * scale);
        if (bulletSpread >= 3) {
            bullets.push({ x: centerX - w/2, y: y, w: w, h: h, vy: baseVy, color: '#7dd3fc', power: bulletPower });
            bullets.push({ x: centerX - w/2 - 10, y: y + 5, w: w, h: h, vy: baseVy * 0.9, vx: -1.5, color: '#60a5fa', power: bulletPower });
            bullets.push({ x: centerX - w/2 + 10, y: y + 5, w: w, h: h, vy: baseVy * 0.9, vx: 1.5, color: '#60a5fa', power: bulletPower });
        } else if (bulletSpread >= 2) {
            bullets.push({ x: centerX - w/2 - 6, y: y, w: w, h: h, vy: baseVy, color: '#7dd3fc', power: bulletPower });
            bullets.push({ x: centerX - w/2 + 6, y: y, w: w, h: h, vy: baseVy, color: '#7dd3fc', power: bulletPower });
        } else {
            bullets.push({ x: centerX - w/2, y: y, w: w, h: h, vy: baseVy, color: '#7dd3fc', power: bulletPower });
        }
        playSound('shoot');
    }

    function createEnemy() {
        const speedLevel = Math.floor(score / 200);
        const sizeBase = Math.random() < 0.3 ? 50 : 36;
        const size = Math.round(sizeBase * scale);
        const type = sizeBase === 50 ? 'big' : (Math.random() < 0.5 ? 'fast' : 'normal');
        const speedMult = 0.4 * (1 + speedLevel * 0.2);
        const e = {
            x: Math.random() * (canvas.width - size),
            y: -size,
            w: size, h: size,
            vy: (type === 'fast' ? 4 : 2) * speedMult,
            vx: (Math.random() - 0.5) * (type === 'big' ? 1.5 : 1),
            hp: type === 'big' ? 3 : 1,
            maxHp: type === 'big' ? 3 : 1,
            type: type,
            color: type === 'big' ? '#e74c3c' : (type === 'fast' ? '#8e44ad' : '#7f8c8d')
        };
        enemies.push(e);
    }

    function createBoss() {
        const bw = Math.round(80 * scale);
        const bh = Math.round(100 * scale);
        const bossLevel = Math.floor(nextBossScore / 2000);
        const bossHp = 100 + (bossLevel - 1) * 50;
        boss = {
            x: canvas.width / 2 - bw / 2,
            y: -bh - 20,
            w: bw, h: bh,
            targetY: Math.round(80 * scale),
            hp: bossHp,
            maxHp: bossHp,
            vx: 2,
            lastAttack: 0,
            phase: 'enter', // enter / attack
            color: '#9b59b6',
            shieldColor: '#8e44ad'
        };
        bossSpawned = true;
        // 显示警告
        bossWarn.classList.add('show');
        setTimeout(() => bossWarn.classList.remove('show'), 2000);
    }

    function createBossBullet() {
        if (!boss) return;
        const bx = boss.x + boss.w / 2;
        const by = boss.y + boss.h;
        const bSize = Math.round(6 * scale);
        // 扇形3发
        bossBullets.push({ x: bx - bSize/2, y: by, w: bSize, h: bSize, vy: 4, vx: 0, color: '#e74c3c' });
        bossBullets.push({ x: bx - bSize/2 - 8, y: by + 5, w: bSize, h: bSize, vy: 3.5, vx: -1.5, color: '#e74c3c' });
        bossBullets.push({ x: bx - bSize/2 + 8, y: by + 5, w: bSize, h: bSize, vy: 3.5, vx: 1.5, color: '#e74c3c' });
    }

    function createPowerup(x, y) {
        if (Math.random() > 0.2) return;
        const types = ['speed', 'spread', 'power'];
        const type = types[Math.floor(Math.random() * types.length)];
        const icons = { speed: '⚡', spread: '✦', power: '⚔️' };
        const colors = { speed: '#ffd700', spread: '#00cec9', power: '#e84393' };
        const size = Math.round(24 * scale);
        powerups.push({ x: x, y: y, w: size, h: size, vy: 2, type: type, icon: icons[type], color: colors[type], life: 5000 });
    }

    function createExplosion(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            particles.push({ x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, r: Math.random() * 3 + 1, life: 30 + Math.random() * 20, color: color || '#f59e0b' });
        }
    }

    function adjustColor(hex, amount) {
        const num = parseInt(hex.replace('#', ''), 16);
        const r = Math.min(255, Math.max(0, (num >> 16) + amount));
        const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
        const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
        return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
    }

    function collide(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function update(dt) {
        if (!running) return;

        // 玩家移动
        if (keys['ArrowLeft']) player.x -= player.speed;
        if (keys['ArrowRight']) player.x += player.speed;
        if (keys['ArrowUp']) player.y -= player.speed;
        if (keys['ArrowDown']) player.y += player.speed;
        if (touchX !== null) {
            const tx = touchX - player.w / 2;
            const ty = touchY - player.h / 2;
            player.x += (tx - player.x) * 0.15;
            player.y += (ty - player.y) * 0.15;
        }
        if (mouseDown && mouseX !== null) {
            const mx = mouseX - player.w / 2;
            const my = mouseY - player.h / 2;
            player.x += (mx - player.x) * 0.15;
            player.y += (my - player.y) * 0.15;
        }
        player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
        player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

        // 自动射击
        lastShot += dt;
        if (lastShot > 133) { createBullet(); lastShot = 0; }

        // 生成敌机（每1000分+1数量，Boss存在时暂停）
        const speedLevel = Math.floor(score / 200);
        const countLevel = Math.floor(score / 1000);
        lastEnemy += dt;
        const spawnRate = Math.max(300, 1200 - speedLevel * 150);
        if (!boss && lastEnemy > spawnRate) {
            const spawnCount = 1 + countLevel;
            for (let i = 0; i < spawnCount; i++) createEnemy();
            lastEnemy = 0;
        }

        // 检查Boss触发
        if (!bossSpawned && score >= nextBossScore) {
            createBoss();
        }

        // 更新Boss
        if (boss) {
            // 进入动画
            if (boss.phase === 'enter') {
                boss.y += 2;
                if (boss.y >= boss.targetY) {
                    boss.y = boss.targetY;
                    boss.phase = 'attack';
                }
            } else {
                // 左右移动
                boss.x += boss.vx;
                if (boss.x <= 0 || boss.x + boss.w >= canvas.width) boss.vx *= -1;
                // 攻击
                boss.lastAttack += dt;
                if (boss.lastAttack > 600) {
                    createBossBullet();
                    boss.lastAttack = 0;
                }
            }
        }

        // 更新玩家子弹
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.y += b.vy;
            if (b.vx) b.x += b.vx;
            if (b.y + b.h < 0) { bullets.splice(i, 1); continue; }

            // 击中Boss
            if (boss && collide(b, boss)) {
                boss.hp -= b.power;
                bullets.splice(i, 1);
                createExplosion(b.x + b.w/2, b.y + b.h/2, '#9b59b6', 4);
                playSound('bossHit');
                if (boss.hp <= 0) {
                    createExplosion(boss.x + boss.w/2, boss.y + boss.h/2, '#9b59b6', 50);
                    playSound('bossExplode');
                    score += 100;
                    scoreEl.textContent = score;
                    createPowerup(boss.x + boss.w/2, boss.y + boss.h/2);
                    createPowerup(boss.x + boss.w/2 - 20, boss.y + boss.h/2 + 20);
                    createPowerup(boss.x + boss.w/2 + 20, boss.y + boss.h/2 + 20);
                    boss = null;
                    nextBossScore += 2000;
                }
                continue;
            }

            // 击中普通敌机
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                if (collide(b, e)) {
                    e.hp -= b.power;
                    bullets.splice(i, 1);
                    if (e.hp <= 0) {
                        createExplosion(e.x + e.w/2, e.y + e.h/2, e.color, e.type === 'big' ? 20 : 12);
                        playSound('explode');
                        score += e.type === 'big' ? 50 : (e.type === 'fast' ? 20 : 10);
                        scoreEl.textContent = score;
                        createPowerup(e.x + e.w/2, e.y + e.h/2);
                        enemies.splice(j, 1);
                    } else {
                        playSound('hit');
                        createExplosion(b.x + b.w/2, b.y + b.h/2, e.color, 3);
                    }
                    break;
                }
            }
        }

        // 更新Boss子弹
        for (let i = bossBullets.length - 1; i >= 0; i--) {
            const b = bossBullets[i];
            b.y += b.vy;
            if (b.vx) b.x += b.vx;
            if (b.y > canvas.height || b.x < 0 || b.x > canvas.width) { bossBullets.splice(i, 1); continue; }
            if (collide(b, player)) {
                createExplosion(player.x + player.w/2, player.y + player.h/2, '#7dd3fc', 30);
                playSound('playerHit');
                player.hp--;
                bossBullets.splice(i, 1);
                if (player.hp <= 0) gameOver();
            }
        }

        // 更新掉落道具
        for (let i = powerups.length - 1; i >= 0; i--) {
            const p = powerups[i];
            p.y += p.vy;
            p.life -= dt;
            if (p.y > canvas.height || p.life <= 0) { powerups.splice(i, 1); continue; }
            if (collide(p, player)) {
                applyPowerup(p.type);
                powerups.splice(i, 1);
            }
        }

        // 更新敌机
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            e.y += e.vy;
            e.x += e.vx;
            if (e.x <= 0 || e.x + e.w >= canvas.width) e.vx *= -1;
            if (e.y > canvas.height) { enemies.splice(i, 1); continue; }
            if (collide(e, player)) {
                createExplosion(player.x + player.w/2, player.y + player.h/2, '#7dd3fc', 30);
                playSound('playerHit');
                player.hp--;
                enemies.splice(i, 1);
                if (player.hp <= 0) gameOver();
            }
        }

        // 更新粒子
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.life--;
            if (p.life <= 0) particles.splice(i, 1);
        }

        // 更新星空
        for (let s of stars) {
            s.y += s.s;
            if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
        }

        // 检查道具过期
        checkPowerupExpire(dt);
        updatePowerupUI();
    }

    function draw() {
        ctx.fillStyle = '#0a0e1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let s of stars) {
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = s.r / 2.5;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        if (!running) return;

        // ===== BOSS血条 =====
        if (boss) {
            const barW = Math.min(canvas.width * 0.8, 300);
            const barH = 10;
            const barX = (canvas.width - barW) / 2;
            const barY = 10;
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(barX, barY, barW, barH);
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(barX, barY, barW * (boss.hp / boss.maxHp), barH);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(barX, barY, barW, barH);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('👹 BOSS', canvas.width / 2, barY + barH + 14);
        }

        // 玩家飞机
        ctx.fillStyle = '#3b82f6';
        ctx.beginPath();
        ctx.moveTo(player.x + player.w/2, player.y);
        ctx.lineTo(player.x + player.w, player.y + player.h * 0.7);
        ctx.lineTo(player.x + player.w * 0.8, player.y + player.h);
        ctx.lineTo(player.x + player.w * 0.2, player.y + player.h);
        ctx.lineTo(player.x, player.y + player.h * 0.7);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#60a5fa';
        const wingW = Math.round(12 * scale);
        const wingH = Math.round(6 * scale);
        ctx.fillRect(player.x - wingW + 4, player.y + player.h * 0.55, wingW, wingH);
        ctx.fillRect(player.x + player.w - 4, player.y + player.h * 0.55, wingW, wingH);
        ctx.fillStyle = '#f59e0b';
        ctx.beginPath();
        ctx.arc(player.x + player.w/2, player.y + player.h - 2, Math.round(5 * scale), 0, Math.PI*2);
        ctx.fill();

        // 玩家子弹
        for (let b of bullets) {
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y, b.w, b.h);
        }

        // Boss子弹
        for (let b of bossBullets) {
            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.arc(b.x + b.w/2, b.y + b.h/2, b.w/2, 0, Math.PI*2);
            ctx.fill();
        }

        // 掉落道具
        for (let p of powerups) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = 0.8 + Math.sin(Date.now() / 200) * 0.2;
            ctx.beginPath();
            ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.round(14 * scale)}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(p.icon, p.x + p.w/2, p.y + p.h/2 + 1);
        }

        // 敌机
        for (let e of enemies) {
            ctx.save();
            ctx.translate(e.x + e.w/2, e.y + e.h/2);
            ctx.rotate(Math.PI); // 旋转180度，使敌机头朝下
            // 机身
            ctx.fillStyle = e.color;
            ctx.beginPath();
            ctx.moveTo(0, -e.h/2 + 4);
            ctx.lineTo(e.w/2 - 4, e.h/2 - 8);
            ctx.lineTo(0, e.h/2);
            ctx.lineTo(-e.w/2 + 4, e.h/2 - 8);
            ctx.closePath();
            ctx.fill();
            // 机翼
            ctx.fillStyle = adjustColor(e.color, -20);
            ctx.beginPath();
            ctx.moveTo(-e.w/2, 0);
            ctx.lineTo(e.w/2, 0);
            ctx.lineTo(e.w/2 - 2, e.h/4);
            ctx.lineTo(-e.w/2 + 2, e.h/4);
            ctx.closePath();
            ctx.fill();
            // 尾翼
            ctx.fillStyle = adjustColor(e.color, -40);
            ctx.beginPath();
            ctx.moveTo(0, -e.h/2 + 4);
            ctx.lineTo(-e.w/4, -e.h/2 + 10);
            ctx.lineTo(e.w/4, -e.h/2 + 10);
            ctx.closePath();
            ctx.fill();
            // 驾驶舱
            ctx.fillStyle = '#7dd3fc';
            ctx.beginPath();
            ctx.arc(0, -e.h/6, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            if (e.type === 'big' && e.hp > 0) {
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(e.x, e.y - 8, e.w, 4);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(e.x, e.y - 8, e.w * (e.hp / e.maxHp), 4);
            }
        }

        // BOSS绘制
        if (boss) {
            // 护盾光晕
            ctx.strokeStyle = boss.shieldColor;
            ctx.lineWidth = 3;
            ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 300) * 0.2;
            ctx.beginPath();
            ctx.arc(boss.x + boss.w/2, boss.y + boss.h/2, boss.w * 0.7, 0, Math.PI*2);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // 机身
            ctx.fillStyle = boss.color;
            ctx.beginPath();
            ctx.moveTo(boss.x + boss.w/2, boss.y + boss.h);
            ctx.lineTo(boss.x + boss.w, boss.y + boss.h * 0.4);
            ctx.lineTo(boss.x + boss.w * 0.85, boss.y);
            ctx.lineTo(boss.x + boss.w * 0.15, boss.y);
            ctx.lineTo(boss.x, boss.y + boss.h * 0.4);
            ctx.closePath();
            ctx.fill();

            // 装甲板
            ctx.fillStyle = '#8e44ad';
            ctx.fillRect(boss.x + boss.w * 0.2, boss.y + boss.h * 0.35, boss.w * 0.6, 4);
            ctx.fillRect(boss.x + boss.w * 0.3, boss.y + boss.h * 0.55, boss.w * 0.4, 4);

            // 眼睛
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(boss.x + boss.w * 0.35, boss.y + boss.h * 0.25, boss.w * 0.08, 0, Math.PI*2);
            ctx.arc(boss.x + boss.w * 0.65, boss.y + boss.h * 0.25, boss.w * 0.08, 0, Math.PI*2);
            ctx.fill();

            // 炮口
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(boss.x + boss.w * 0.25 - 3, boss.y + boss.h - 6, 6, 8);
            ctx.fillRect(boss.x + boss.w * 0.5 - 3, boss.y + boss.h - 6, 6, 8);
            ctx.fillRect(boss.x + boss.w * 0.75 - 3, boss.y + boss.h - 6, 6, 8);
        }

        // 粒子
        for (let p of particles) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / 40;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    function startGame() {
        ensureAudio();
        startOverlay.style.display = 'none';
        overOverlay.style.display = 'none';
        scoreBoard.style.display = 'block';
        score = 0;
        scoreEl.textContent = '0';
        bullets.length = 0;
        enemies.length = 0;
        particles.length = 0;
        powerups.length = 0;
        bossBullets.length = 0;
        initPlayer();
        running = true;
    }
    function restartGame() { startGame(); }
    function gameOver() {
        running = false;
        finalScoreEl.textContent = score;
        overOverlay.style.display = 'flex';
        scoreBoard.style.display = 'none';
        tagSpeed.classList.remove('active');
        tagSpread.classList.remove('active');
        tagPower.classList.remove('active');
    }

    window.startGame = startGame;
    window.restartGame = restartGame;

    let lastTime = 0;
    function loop(timestamp) {
        const dt = timestamp - lastTime;
        lastTime = timestamp;
        update(dt);
        draw();
        requestAnimationFrame(loop);
    }
    initPlayer();
    draw();
    requestAnimationFrame(loop);
})();
</script>
</body>
